    <!-- PDF/Excel Export Libraries with fallback CDN -->
    <script>
      function loadScript(src, fallback) {
        const s = document.createElement('script');
        s.src = src;
        s.async = true;
        s.crossOrigin = 'anonymous';
        s.onerror = function () {
          if (fallback) {
            const f = document.createElement('script');
            f.src = fallback;
            f.async = true;
            f.crossOrigin = 'anonymous';
            document.head.appendChild(f);
          }
        };
        document.head.appendChild(s);
      }
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js', 'https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js');
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js', 'https://unpkg.com/jspdf-autotable@3.5.31/dist/jspdf.plugin.autotable.min.js');
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js', 'https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js');
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js', 'https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js');
    </script>

  </body>
