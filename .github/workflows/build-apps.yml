name: Build Apps

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  NODE_VERSION: 22
  RUST_VERSION: 1.75

jobs:
  # ── Build Windows desktop apps (Tauri) ──────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        app: [cashier-desktop, admin-desktop]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Build ${{ matrix.app }}
        run: npm run build:${{ matrix.app }}
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-windows
          path: |
            apps/${{ matrix.app }}/src-tauri/target/release/bundle/nsis/*.exe
            apps/${{ matrix.app }}/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            apps/${{ matrix.app }}/src-tauri/target/release/bundle/nsis/*.exe
            apps/${{ matrix.app }}/src-tauri/target/release/bundle/msi/*.msi

  # NOTE: Android builds are disabled until the Capacitor Android platform is
  # initialized in apps/cashier-android/android and apps/admin-android/android.
  # Run `npx cap add android` in each app directory, then re-enable this job.
