name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

env:
  NODE_VERSION: 22
  VITE_API_URL: https://api.softshape.in/
  VITE_FIREBASE_API_KEY: AIzaSyD7OBT4VOtniMIGWSkpCVHV6wPsdJZKqy4
  VITE_FIREBASE_AUTH_DOMAIN: softshapeai-14324.firebaseapp.com
  VITE_FIREBASE_PROJECT_ID: softshapeai-14324
  VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
  VITE_SENTRY_DSN: https://0265523fc50be65aad6018cb11266b19@o4511625453699072.ingest.us.sentry.io/4511625461497856
  VITE_PRINT_AGENT_DOWNLOAD_URL: https://github.com/varunkumar06011/softshape-print-agent/releases/latest/download/SoftShape.Print.Agent_x64-setup.exe
  VITE_CASHIER_DESKTOP_DOWNLOAD_URL: https://github.com/varunkumar06011/Softshapeai/releases/latest/download/SoftShape.Cashier_x64-setup.exe
  VITE_CASHIER_ANDROID_DOWNLOAD_URL: https://github.com/varunkumar06011/Softshapeai/releases/latest/download/cashier-android.apk
  VITE_ADMIN_DESKTOP_DOWNLOAD_URL: https://github.com/varunkumar06011/Softshapeai/releases/latest/download/SoftShape.Admin_x64-setup.exe
  VITE_ADMIN_ANDROID_DOWNLOAD_URL: https://github.com/varunkumar06011/Softshapeai/releases/latest/download/admin-android.apk
  VITE_CAPTAIN_ANDROID_DOWNLOAD_URL: https://github.com/varunkumar06011/Softshapeai/releases/latest/download/captain-android.apk

permissions:
  contents: write

jobs:
  # ── Test & lint (runs on every push/PR) ─────────────────────────────────────
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test

      - name: Build (compile check)
        run: npm run build

  # ── Build Cashier Desktop (Tauri + edge-server sidecar) ─────────────────────
  build-cashier-desktop:
    name: Cashier Desktop (Windows)
    runs-on: windows-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Checkout edge-server repo
        uses: actions/checkout@v4
        with:
          repository: varunkumar06011/softshape-print-agent
          path: softshape-print-agent

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install desktop app dependencies
        working-directory: apps/cashier-desktop
        run: npm install --legacy-peer-deps

      - name: Build edge server
        working-directory: softshape-print-agent/softshape-print-agent/edge-server
        shell: bash
        run: |
          bun install
          bun build --compile server.ts --outfile edge-server.exe

      - name: Verify edge-server.exe was produced
        working-directory: softshape-print-agent/softshape-print-agent/edge-server
        shell: bash
        run: |
          if [ ! -f edge-server.exe ]; then
            echo "::error::edge-server.exe was not produced by bun build --compile"
            ls -la
            exit 1
          fi
          ls -la edge-server.exe

      - name: Generate Tauri icons
        working-directory: apps/cashier-desktop
        shell: bash
        run: npx tauri icon "../../public/logo softshape.ai.png"

      - name: Build Cashier Desktop
        run: npm run build:cashier-desktop
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Verify edge-server.exe bundled into resources
        shell: bash
        run: |
          # Tauri v2 may place resources directly in release/ or in release/resources/
          found=""
          for candidate in \
            "apps/cashier-desktop/src-tauri/target/release/resources/edge-server.exe" \
            "apps/cashier-desktop/src-tauri/target/release/edge-server.exe"; do
            if [ -f "$candidate" ]; then
              found="$candidate"
              break
            fi
          done
          if [ -z "$found" ]; then
            echo "::error::edge-server.exe not found in Tauri build output"
            find apps/cashier-desktop/src-tauri/target/release -name 'edge-server.exe' 2>/dev/null || true
            ls -laR apps/cashier-desktop/src-tauri/target/release/resources 2>/dev/null || true
            exit 1
          fi
          echo "Found edge-server.exe at: $found"
          ls -la "$found"

      - name: Rename installer
        shell: bash
        run: |
          set +e
          dir="apps/cashier-desktop/src-tauri/target/release/bundle/nsis"
          fixed="SoftShape.Cashier_x64-setup.exe"
          ls -la "$dir" || echo "(directory not found or empty)"
          exe=$(ls "$dir"/*.exe 2>/dev/null | grep -v "$fixed" | head -n 1)
          sig=$(ls "$dir"/*.sig 2>/dev/null | head -n 1)
          if [ -n "$exe" ] && [ -f "$exe" ]; then
            mv "$exe" "$dir/$fixed"
          fi
          if [ -n "$sig" ] && [ -f "$sig" ]; then
            mv "$sig" "$dir/${fixed}.sig"
          fi

      - name: Smoke-test installed edge-server health
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $installer = "apps/cashier-desktop/src-tauri/target/release/bundle/nsis/SoftShape.Cashier_x64-setup.exe"
          if (-not (Test-Path $installer)) {
            Write-Error "Installer not found at $installer"
            exit 1
          }

          $installDir = Join-Path $env:RUNNER_TEMP "softshape-cashier-smoke"
          if (Test-Path $installDir) { Remove-Item -Recurse -Force $installDir }
          New-Item -ItemType Directory -Path $installDir | Out-Null

          Write-Host "Silent-installing to $installDir"
          $proc = Start-Process -FilePath (Resolve-Path $installer) -ArgumentList "/S","/D=$installDir" -Wait -PassThru
          if ($proc.ExitCode -ne 0) {
            Write-Error "NSIS silent install failed with exit code $($proc.ExitCode)"
            exit 1
          }

          $appExe = Get-ChildItem -Path $installDir -Recurse -Filter "SoftShape Cashier.exe" -ErrorAction SilentlyContinue |
            Select-Object -First 1
          if (-not $appExe) {
            $appExe = Get-ChildItem -Path $installDir -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -notmatch 'uninstall|edge-server' } |
              Select-Object -First 1
          }
          if (-not $appExe) {
            Write-Host "Install tree:"
            Get-ChildItem -Path $installDir -Recurse | Select-Object FullName
            Write-Error "Installed SoftShape Cashier.exe not found under $installDir"
            exit 1
          }

          $resourceExe = Join-Path $installDir "edge-server.exe"
          if (-not (Test-Path $resourceExe)) {
            $resourceExe = Get-ChildItem -Path $installDir -Recurse -Filter "edge-server.exe" -ErrorAction SilentlyContinue |
              Select-Object -First 1 -ExpandProperty FullName
          }
          Write-Host "App exe: $($appExe.FullName)"
          Write-Host "edge-server.exe: $resourceExe"
          if (-not $resourceExe -or -not (Test-Path $resourceExe)) {
            Write-Error "edge-server.exe missing from installed tree — resources packaging is broken"
            exit 1
          }

          # Prefer launching the bundled edge-server directly for a deterministic health check.
          # The full GUI app may hang on WebView2 first-run; edge-server is the packaging contract.
          # (Avoid Start-Process -Environment — not available on Windows PowerShell 5.1.)
          $prevEdgePort = $env:EDGE_PORT
          $env:EDGE_PORT = "3100"
          $edgeProc = Start-Process -FilePath $resourceExe -PassThru -WindowStyle Hidden `
            -WorkingDirectory (Split-Path $resourceExe)
          if ($null -ne $prevEdgePort) { $env:EDGE_PORT = $prevEdgePort } else { Remove-Item Env:EDGE_PORT -ErrorAction SilentlyContinue }

          $healthy = $false
          $deadline = (Get-Date).AddSeconds(15)
          while ((Get-Date) -lt $deadline) {
            try {
              $resp = Invoke-WebRequest -Uri "http://127.0.0.1:3100/health" -UseBasicParsing -TimeoutSec 2
              if ($resp.StatusCode -eq 200) {
                Write-Host "Health OK: $($resp.Content)"
                $healthy = $true
                break
              }
            } catch {
              Start-Sleep -Milliseconds 500
            }
          }

          if ($edgeProc -and -not $edgeProc.HasExited) {
            Stop-Process -Id $edgeProc.Id -Force -ErrorAction SilentlyContinue
          }
          Get-Process -Name "edge-server" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue

          if (-not $healthy) {
            Write-Error "edge-server never responded on http://127.0.0.1:3100/health within 15s"
            exit 1
          }

          Write-Host "Smoke test passed: installed edge-server.exe is healthy"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cashier-desktop-windows
          path: |
            apps/cashier-desktop/src-tauri/target/release/bundle/nsis/SoftShape.Cashier_x64-setup.exe
            apps/cashier-desktop/src-tauri/target/release/bundle/nsis/SoftShape.Cashier_x64-setup.exe.sig
            apps/cashier-desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            apps/cashier-desktop/src-tauri/target/release/bundle/nsis/SoftShape.Cashier_x64-setup.exe
            apps/cashier-desktop/src-tauri/target/release/bundle/nsis/SoftShape.Cashier_x64-setup.exe.sig
            apps/cashier-desktop/src-tauri/target/release/bundle/msi/*.msi

  # ── Build Admin Desktop (Tauri, no edge-server) ─────────────────────────────
  build-admin-desktop:
    name: Admin Desktop (Windows)
    runs-on: windows-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install desktop app dependencies
        working-directory: apps/admin-desktop
        run: npm install --legacy-peer-deps

      - name: Generate Tauri icons
        working-directory: apps/admin-desktop
        shell: bash
        run: npx tauri icon "../../public/logo-square.png"

      - name: Build Admin Desktop
        run: npm run build:admin-desktop
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Rename installer
        shell: bash
        run: |
          set +e
          dir="apps/admin-desktop/src-tauri/target/release/bundle/nsis"
          fixed="SoftShape.Admin_x64-setup.exe"
          ls -la "$dir" || echo "(directory not found or empty)"
          exe=$(ls "$dir"/*.exe 2>/dev/null | grep -v "$fixed" | head -n 1)
          sig=$(ls "$dir"/*.sig 2>/dev/null | head -n 1)
          if [ -n "$exe" ] && [ -f "$exe" ]; then
            mv "$exe" "$dir/$fixed"
          fi
          if [ -n "$sig" ] && [ -f "$sig" ]; then
            mv "$sig" "$dir/${fixed}.sig"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-desktop-windows
          path: |
            apps/admin-desktop/src-tauri/target/release/bundle/nsis/SoftShape.Admin_x64-setup.exe
            apps/admin-desktop/src-tauri/target/release/bundle/nsis/SoftShape.Admin_x64-setup.exe.sig
            apps/admin-desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            apps/admin-desktop/src-tauri/target/release/bundle/nsis/SoftShape.Admin_x64-setup.exe
            apps/admin-desktop/src-tauri/target/release/bundle/nsis/SoftShape.Admin_x64-setup.exe.sig
            apps/admin-desktop/src-tauri/target/release/bundle/msi/*.msi

  # ── Build Android apps (Capacitor) ──────────────────────────────────────────
  build-android:
    name: Android ${{ matrix.app }}
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        app: [cashier-android, admin-android, captain-android]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Verify signing secrets
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE }}" ]; then
            echo "::error::ANDROID_KEYSTORE secret missing — refusing to build unsigned APK"
            exit 1
          fi

      - name: Add Android platform
        working-directory: apps/${{ matrix.app }}
        shell: bash
        run: |
          if [ ! -f "android/gradlew" ]; then
            rm -rf android
            npx cap add android
          fi

      - name: Sync Capacitor
        working-directory: apps/${{ matrix.app }}
        run: npx cap sync android

      - name: Decode keystore
        working-directory: apps/${{ matrix.app }}/android
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > app/release.keystore

      - name: Set Android version code and name
        working-directory: apps/${{ matrix.app }}/android
        shell: bash
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME=${{ github.ref_name }}
          sed -i -E "s/versionCode [0-9]+/versionCode $VERSION_CODE/" app/build.gradle
          sed -i -E "s/versionName \"[^\"]+\"/versionName \"$VERSION_NAME\"/" app/build.gradle

      - name: Build & sign APK
        working-directory: apps/${{ matrix.app }}/android
        shell: bash
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Rename signed APK
        working-directory: apps/${{ matrix.app }}/android
        shell: bash
        run: |
          src="app/build/outputs/apk/release/app-release.apk"
          if [ -f "$src" ]; then
            mv "$src" "app/build/outputs/apk/release/${{ matrix.app }}.apk"
          else
            echo "::error::Signed APK not found at $src"
            exit 1
          fi

      - name: Verify APK signature
        working-directory: apps/${{ matrix.app }}/android
        shell: bash
        run: |
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" verify app/build/outputs/apk/release/${{ matrix.app }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-android
          path: apps/${{ matrix.app }}/android/app/build/outputs/apk/release/${{ matrix.app }}.apk
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: apps/${{ matrix.app }}/android/app/build/outputs/apk/release/${{ matrix.app }}.apk
