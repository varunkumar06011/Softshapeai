name: Build Apps

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  NODE_VERSION: 22
  RUST_VERSION: 1.88
  VITE_API_URL: https://softshape-backend.onrender.com
  VITE_FIREBASE_API_KEY: AIzaSyD7OBT4VOtniMIGWSkpCVHV6wPsdJZKqy4
  VITE_FIREBASE_AUTH_DOMAIN: softshapeai-14324.firebaseapp.com
  VITE_FIREBASE_PROJECT_ID: softshapeai-14324
  VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
  VITE_SENTRY_DSN: https://0265523fc50be65aad6018cb11266b19@o4511625453699072.ingest.us.sentry.io/4511625461497856
  VITE_PRINT_AGENT_DOWNLOAD_URL: https://github.com/varunkumar06011/softshape-print-agent/releases/latest/download/SoftShape.Print.Agent_1.2.7_x64-setup.exe
  VITE_CASHIER_DESKTOP_DOWNLOAD_URL: https://github.com/varunkumar06011/Softshapeai/releases/download/v1.2.7/SoftShape.Cashier_1.2.7_x64-setup.exe
  VITE_CASHIER_ANDROID_DOWNLOAD_URL: https://github.com/varunkumar06011/Softshapeai/releases/download/v1.2.7/cashier-android.apk
  VITE_ADMIN_DESKTOP_DOWNLOAD_URL: https://github.com/varunkumar06011/Softshapeai/releases/download/v1.2.7/SoftShape.Admin_1.2.7_x64-setup.exe
  VITE_ADMIN_ANDROID_DOWNLOAD_URL: https://github.com/varunkumar06011/Softshapeai/releases/download/v1.2.7/admin-android.apk
  VITE_CAPTAIN_ANDROID_DOWNLOAD_URL: https://github.com/varunkumar06011/Softshapeai/releases/download/v1.2.7/captain-android.apk

permissions:
  contents: write

jobs:
  # ── Build Windows desktop apps (Tauri) ──────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        app: [cashier-desktop, admin-desktop]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Install desktop app dependencies
        working-directory: apps/${{ matrix.app }}
        run: npm install --legacy-peer-deps

      - name: Generate Tauri icons
        working-directory: apps/${{ matrix.app }}
        shell: bash
        run: npx tauri icon "../../public/logo softshape.ai.png"

      - name: Build ${{ matrix.app }}
        run: npm run build:${{ matrix.app }}
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-windows
          path: |
            apps/${{ matrix.app }}/src-tauri/target/release/bundle/nsis/*.exe
            apps/${{ matrix.app }}/src-tauri/target/release/bundle/nsis/*.sig
            apps/${{ matrix.app }}/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            apps/${{ matrix.app }}/src-tauri/target/release/bundle/nsis/*.exe
            apps/${{ matrix.app }}/src-tauri/target/release/bundle/nsis/*.sig
            apps/${{ matrix.app }}/src-tauri/target/release/bundle/msi/*.msi

  # ── Build Android apps (Capacitor) ──────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [cashier-android, admin-android, captain-android]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-version: 33

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web app
        run: npm run build

      - name: Verify signing secrets
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE }}" ]; then
            echo "::error::ANDROID_KEYSTORE secret missing — refusing to build unsigned APK"
            exit 1
          fi

      - name: Add Android platform
        working-directory: apps/${{ matrix.app }}
        shell: bash
        run: |
          if [ ! -f "android/gradlew" ]; then
            rm -rf android
            npx cap add android
          fi

      - name: Sync Capacitor
        working-directory: apps/${{ matrix.app }}
        run: npx cap sync android

      - name: Decode keystore
        working-directory: apps/${{ matrix.app }}/android
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > app/release.keystore

      - name: Set Android version code and name
        working-directory: apps/${{ matrix.app }}/android
        shell: bash
        run: |
          VERSION_CODE=${{ github.run_number }}
          VERSION_NAME=${{ github.ref_name }}
          sed -i -E "s/versionCode [0-9]+/versionCode $VERSION_CODE/" app/build.gradle
          sed -i -E "s/versionName \"[^\"]+\"/versionName \"$VERSION_NAME\"/" app/build.gradle

      - name: Build & sign APK
        working-directory: apps/${{ matrix.app }}/android
        shell: bash
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
            -Pandroid.injected.signing.store.password="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Rename signed APK
        working-directory: apps/${{ matrix.app }}/android
        shell: bash
        run: |
          src="app/build/outputs/apk/release/app-release.apk"
          if [ -f "$src" ]; then
            mv "$src" "app/build/outputs/apk/release/${{ matrix.app }}.apk"
          else
            echo "::error::Signed APK not found at $src"
            exit 1
          fi

      - name: Verify APK signature
        working-directory: apps/${{ matrix.app }}/android
        shell: bash
        run: |
          BUILD_TOOLS=$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -n 1)
          "$ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner" verify app/build/outputs/apk/release/${{ matrix.app }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-android
          path: apps/${{ matrix.app }}/android/app/build/outputs/apk/release/${{ matrix.app }}.apk
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: apps/${{ matrix.app }}/android/app/build/outputs/apk/release/${{ matrix.app }}.apk
