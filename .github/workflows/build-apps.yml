name: Build Apps

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  NODE_VERSION: 18
  RUST_VERSION: 1.75

jobs:
  # ── Build Windows desktop apps (Tauri) ──────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        app: [cashier-desktop, admin-desktop]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Softshapeai/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install dependencies
        working-directory: Softshapeai
        run: npm ci

      - name: Build web app
        working-directory: Softshapeai
        run: npm run build

      - name: Build ${{ matrix.app }}
        working-directory: Softshapeai
        run: npm run build:${{ matrix.app }}
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-windows
          path: |
            Softshapeai/apps/${{ matrix.app }}/src-tauri/target/release/bundle/nsis/*.exe
            Softshapeai/apps/${{ matrix.app }}/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            Softshapeai/apps/${{ matrix.app }}/src-tauri/target/release/bundle/nsis/*.exe
            Softshapeai/apps/${{ matrix.app }}/src-tauri/target/release/bundle/msi/*.msi

  # ── Build Android apps (Capacitor) ──────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [cashier-android, admin-android]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Softshapeai/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-version: 33

      - name: Install dependencies
        working-directory: Softshapeai
        run: npm ci

      - name: Build web app + sync Capacitor
        working-directory: Softshapeai
        run: npm run build:${{ matrix.app }}

      - name: Build APK
        working-directory: Softshapeai/apps/${{ matrix.app }}/android
        run: ./gradlew assembleRelease

      - name: Sign APK
        if: secrets.ANDROID_KEYSTORE != ''
        working-directory: Softshapeai/apps/${{ matrix.app }}/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > app/release.keystore
          ./gradlew signReleaseApp -Pandroid.injected.signing.store.file=app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-android
          path: Softshapeai/apps/${{ matrix.app }}/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: Softshapeai/apps/${{ matrix.app }}/android/app/build/outputs/apk/release/*.apk

  # ── Build print agent (Tauri, Windows) ──────────────────────────────────────
  build-print-agent:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install dependencies
        working-directory: softshape-print-agent
        run: npm ci

      - name: Build print agent
        working-directory: softshape-print-agent
        run: npm run tauri:build
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload print agent
        uses: actions/upload-artifact@v4
        with:
          name: print-agent-windows
          path: |
            softshape-print-agent/src-tauri/target/release/bundle/nsis/*.exe
            softshape-print-agent/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            softshape-print-agent/src-tauri/target/release/bundle/nsis/*.exe
            softshape-print-agent/src-tauri/target/release/bundle/msi/*.msi
