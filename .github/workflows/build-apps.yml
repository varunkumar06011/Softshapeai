name: Build Apps

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  NODE_VERSION: 22
  RUST_VERSION: 1.88

permissions:
  contents: write

jobs:
  # ── Build Windows desktop apps (Tauri) ──────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        app: [cashier-desktop, admin-desktop]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install desktop app dependencies
        working-directory: apps/${{ matrix.app }}
        run: npm install

      - name: Generate Tauri icons
        working-directory: apps/${{ matrix.app }}
        shell: bash
        run: npx tauri icon "../../public/logo softshape.ai.png"

      - name: Build ${{ matrix.app }}
        run: npm run build:${{ matrix.app }}
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-windows
          path: |
            apps/${{ matrix.app }}/src-tauri/target/release/bundle/nsis/*.exe
            apps/${{ matrix.app }}/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            apps/${{ matrix.app }}/src-tauri/target/release/bundle/nsis/*.exe
            apps/${{ matrix.app }}/src-tauri/target/release/bundle/msi/*.msi

  # ── Build Android apps (Capacitor) ──────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [cashier-android, admin-android]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          sdk-version: 33

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        working-directory: apps/${{ matrix.app }}
        run: |
          if [ ! -f "android/gradlew" ]; then
            rm -rf android
            npx cap add android
          fi

      - name: Sync Capacitor
        working-directory: apps/${{ matrix.app }}
        run: npx cap sync android

      - name: Build APK
        working-directory: apps/${{ matrix.app }}/android
        run: ./gradlew assembleRelease

      - name: Check for keystore
        id: keystore
        run: echo "has_keystore=${{ secrets.ANDROID_KEYSTORE != '' }}" >> $GITHUB_OUTPUT

      - name: Sign APK
        if: steps.keystore.outputs.has_keystore == 'true'
        working-directory: apps/${{ matrix.app }}/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > app/release.keystore
          ./gradlew signReleaseApp -Pandroid.injected.signing.store.file=app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.ANDROID_KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.ANDROID_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-android
          path: apps/${{ matrix.app }}/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: apps/${{ matrix.app }}/android/app/build/outputs/apk/release/*.apk
